name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build, push e deploy
    runs-on: [self-hosted, dsc-selfhosted]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Preparar Docker no runner
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"

          if docker info > /dev/null 2>&1; then
            echo "Docker já está disponível."
            docker info
            exit 0
          fi

          echo "Docker ainda não disponível. Tentando iniciar..."

          if command -v systemctl > /dev/null 2>&1; then
            sudo systemctl start docker || true
          fi

          if command -v service > /dev/null 2>&1; then
            sudo service docker start || true
          fi

          echo "Aguardando Docker daemon ficar disponível..."

          for i in {1..60}; do
            if docker info > /dev/null 2>&1; then
              echo "Docker ficou disponível após $i tentativa(s)."
              docker info
              exit 0
            fi

            echo "Tentativa $i/60: Docker ainda indisponível. Aguardando 5s..."
            sleep 5
          done

          echo "Docker não ficou disponível depois de 5 minutos."
          docker version || true
          ls -la /var/run/docker.sock || true
          ps aux | grep -E "dockerd|containerd" | grep -v grep || true

          exit 1

      - name: Prepara nome da imagem (lowercase)
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile        
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy no servidor
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USERNAME }}@dsc.rodrigor.com" \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
