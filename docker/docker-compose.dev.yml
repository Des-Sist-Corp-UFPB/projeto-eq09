# =============================================================================
# Docker Compose — DESENVOLVIMENTO
# =============================================================================
# Sobe o ambiente completo de desenvolvimento com:
#   - app:      Aplicação Spring Boot com hot-reload
#   - postgres: Banco de dados PostgreSQL 16
#   - adminer:  Interface web para inspecionar o banco (http://localhost:8888)
#   - trivy:    Scanner de vulnerabilidades (roda uma vez e sai)
#
# Como usar:
#   docker compose -f docker/docker-compose.dev.yml up
#   docker compose -f docker/docker-compose.dev.yml up --build  # forçar rebuild
#
# Para rodar só o banco:
#   docker compose -f docker/docker-compose.dev.yml up postgres adminer
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mercado-postgres-dev
    environment:
      POSTGRES_DB: mercado_dev
      POSTGRES_USER: mercado
      POSTGRES_PASSWORD: mercado123
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercado -d mercado_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Aplicação Spring Boot (hot-reload)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: mercado-app-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mercado_dev
      SPRING_DATASOURCE_USERNAME: mercado
      SPRING_DATASOURCE_PASSWORD: mercado123
      # Configurações do MinIO local
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT: http://localhost:9000
      AWS_S3_BUCKET: eq09
      AWS_S3_ACCESS_KEY: eq09
      AWS_S3_SECRET_KEY: 01nXvfGS3LUOABjTxleE0Jy7
      AWS_S3_REGION: us-east-1
      OTEL_SERVICE_NAME: eq09-DSCboxd
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
    ports:
      - "8080:8080"
    volumes:
      # Monta o código-fonte para hot-reload
      - ../src:/app/src
      # Persistir dependências Maven (evita re-download a cada restart)
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Frontend React (Vite com hot-reload)
  # Acesse: http://localhost:5173
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: mercado-frontend-dev
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    environment:
      - WATCHPACK_POLLING=true
    command: sh -c "npm run dev -- --host"
    depends_on:
      - app
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Adminer: interface web para o banco de dados
  # Acesse: http://localhost:8888
  # Servidor: postgres | Banco: mercado_dev | Usuário: mercado | Senha: mercado123
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: mercado-adminer
    ports:
      - "8888:8080"
    depends_on:
      - postgres
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # Trivy: scanner de vulnerabilidades (roda e sai — profile: scan)
  # Uso: docker compose -f docker/docker-compose.dev.yml --profile scan up trivy
  # ---------------------------------------------------------------------------
  trivy:
    image: aquasec/trivy:latest
    container_name: mercado-trivy
    profiles:
      - scan
    volumes:
      - ..:/project:ro
      - trivy-cache:/root/.cache/trivy
    command: fs /project --severity HIGH,CRITICAL --exit-code 1
    networks:
      - mercado-net

  # ---------------------------------------------------------------------------
  # MinIO: local Object Storage (S3 compatível)
  # Acesse o Console em: http://localhost:9001 (eq09 / 01nXvfGS3LUOABjTxleE0Jy7)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: mercado-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: eq09
      MINIO_ROOT_PASSWORD: 01nXvfGS3LUOABjTxleE0Jy7
    volumes:
      - minio-dev-data:/data
    command: server /data --console-address ":9001"
    networks:
      - mercado-net

volumes:
  postgres-dev-data:
  maven-cache:
  trivy-cache:
  minio-dev-data:

networks:
  mercado-net:
    driver: bridge
