spring:
  datasource:
    # Em produção, as credenciais vêm de variáveis de ambiente — NUNCA hardcode!
    # Configure no sistema operacional, Docker, Kubernetes secrets, etc.
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

# Configurações AWS S3 / MinIO para Produção
aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://minio:9000}
    public-endpoint: ${AWS_S3_PUBLIC_ENDPOINT:https://s3.dsc.rodrigor.com}
    bucket: ${AWS_S3_BUCKET:eq09}
    access-key: ${AWS_S3_ACCESS_KEY:eq09}
    secret-key: ${AWS_S3_SECRET_KEY:01nXvfGS3LUOABjTxleE0Jy7}
    region: ${AWS_S3_REGION:us-east-1}

logging:
  level:
    root: WARN
    br.ufpb.dsc.mercado: INFO
